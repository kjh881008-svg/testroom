<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 자동추첨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: rgba(0, 0, 0, 0.8);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 750px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      text-align: center;
      color: #bbb;
      margin-bottom: 30px;
      font-size: 0.95em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 30px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-draw {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      flex: 1;
      min-width: 150px;
    }

    .btn-draw:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
    }

    .btn-draw:active {
      transform: translateY(0);
    }

    .btn-clear {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-width: 120px;
    }

    .btn-clear:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .game-count-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .game-count-btn {
      padding: 8px 15px;
      background: #333;
      border: 2px solid #555;
      color: #aaa;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9em;
    }

    .game-count-btn.active {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-color: #f5576c;
      color: white;
    }

    .game-count-btn:hover {
      border-color: #f093fb;
      color: #fff;
    }

    #results {
      min-height: 200px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
    }

    .empty-message {
      grid-column: 1 / -1;
      text-align: center;
      color: #777;
      padding: 40px;
      font-size: 1.1em;
    }

    .game {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #3a7ca5;
      transition: all 0.3s;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    .game:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(42, 82, 152, 0.4);
    }

    .game-header {
      font-size: 0.9em;
      color: #aaa;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .numbers {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .number {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    @keyframes popIn {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 0;
      }
      100% {
        transform: scale(1) rotate(360deg);
        opacity: 1;
      }
    }

    @keyframes spin {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .number.spin {
      animation: spin 0.6s ease-in-out;
    }

    .status {
      text-align: center;
      color: #aaa;
      margin-top: 20px;
      font-size: 0.9em;
      min-height: 20px;
    }

    .status.drawing {
      color: #f093fb;
      font-weight: bold;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎰 로또 자동추첨</h1>
  <p class="subtitle">행운의 로또 번호를 자동으로 생성해보세요</p>

  <div class="game-count-selector">
    <button class="game-count-btn active" onclick="setGameCount(1)">1게임</button>
    <button class="game-count-btn" onclick="setGameCount(5)">5게임</button>
    <button class="game-count-btn" onclick="setGameCount(10)">10게임</button>
  </div>

  <div class="controls">
    <button class="btn-draw" id="drawBtn" onclick="startDrawing()">🎯 추첨 시작</button>
    <button class="btn-clear" onclick="clearResults()">초기화</button>
  </div>

  <div id="results">
    <div class="empty-message">버튼을 눌러 추첨을 시작하세요</div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
  let gameCount = 1;
  let isDrawing = false;

  function setGameCount(count) {
    gameCount = count;
    document.querySelectorAll('.game-count-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    event.target.classList.add('active');
  }

  function generateOneGame() {
    let numbers = [];
    while (numbers.length < 6) {
      let num = Math.floor(Math.random() * 45) + 1;
      if (!numbers.includes(num)) {
        numbers.push(num);
      }
    }
    return numbers.sort((a, b) => a - b);
  }

  function startDrawing() {
    if (isDrawing) return;
    
    isDrawing = true;
    const drawBtn = document.getElementById('drawBtn');
    const status = document.getElementById('status');
    drawBtn.disabled = true;
    status.textContent = '추첨 중...';
    status.classList.add('drawing');

    let games = [];
    for (let i = 0; i < gameCount; i++) {
      games.push(generateOneGame());
    }

    let html = '';
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';

    let animationDelay = 0;
    games.forEach((game, index) => {
      const gameDiv = document.createElement('div');
      gameDiv.className = 'game';
      gameDiv.style.opacity = '0';
      gameDiv.style.transform = 'translateY(20px)';
      
      let header = `<div class="game-header">${index + 1}번 게임</div>`;
      let numbersHtml = '<div class="numbers">';
      
      game.forEach((num, numIndex) => {
        numbersHtml += `<div class="number" style="animation-delay: ${0.1 * numIndex}s">${num}</div>`;
      });
      numbersHtml += '</div>';
      
      gameDiv.innerHTML = header + numbersHtml;
      resultsDiv.appendChild(gameDiv);

      setTimeout(() => {
        gameDiv.style.transition = 'all 0.5s ease-out';
        gameDiv.style.opacity = '1';
        gameDiv.style.transform = 'translateY(0)';
      }, animationDelay);

      animationDelay += 300;
    });

    setTimeout(() => {
      isDrawing = false;
      drawBtn.disabled = false;
      status.textContent = `✨ ${gameCount}개 게임 추첨 완료!`;
      status.classList.remove('drawing');
    }, animationDelay + 600);
  }

  function clearResults() {
    document.getElementById('results').innerHTML = '<div class="empty-message">버튼을 눌러 추첨을 시작하세요</div>';
    document.getElementById('status').textContent = '';
    document.getElementById('status').classList.remove('drawing');
  }
</script>

</body>
</html>
